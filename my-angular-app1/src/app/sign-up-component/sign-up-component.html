<p>Sign Up</p>

<form (ngSubmit)="signUp1()" #form="ngForm">
    <label for="name">Name</label><br>
    <input type="text" name="name" [(ngModel)]="name" required><br>

    <label for="password">Password</label><br>
    <input type="password" name="password" [(ngModel)]="password" required><br>

    <input type="submit" value="Sign Up">
</form> <br><br><br>

@if (isError){
    <p>Error, check if the username and password are correct.</p>
}
